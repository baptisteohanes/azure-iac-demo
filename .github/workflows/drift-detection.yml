name: "Terraform Drift Detection"

on:
  schedule:
    # Tous les jours à 8h00 heure de Paris (7h UTC en hiver CET, 6h UTC en été CEST)
    # Ajuster si nécessaire selon le changement d'heure
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  issues: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: "true"
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  drift-detection:
    name: "Detect Infrastructure Drift"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (drift detection)
        id: plan
        continue-on-error: true
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Evaluate Plan Result
        id: evaluate
        run: |
          EXIT_CODE="${{ steps.plan.outputs.exitcode }}"
          if [ "$EXIT_CODE" = "0" ]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "✅ No drift detected - infrastructure matches Terraform configuration."
          elif [ "$EXIT_CODE" = "2" ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Drift detected - infrastructure has diverged from Terraform configuration."
          else
            echo "drift=error" >> "$GITHUB_OUTPUT"
            echo "❌ Terraform plan failed."
            exit 1
          fi

      - name: Create GitHub Issue on Drift
        if: steps.evaluate.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');

            // Truncate if too long for an issue body
            const maxLen = 60000;
            const truncated = planOutput.length > maxLen
              ? planOutput.substring(0, maxLen) + '\n\n... (truncated)'
              : planOutput;

            const today = new Date().toISOString().slice(0, 10);
            const title = `⚠️ Infrastructure Drift Detected - ${today}`;

            // Check if an open issue already exists for today
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift',
              per_page: 10
            });

            const existingIssue = issues.data.find(i => i.title === title);
            if (existingIssue) {
              console.log(`Issue already exists: #${existingIssue.number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              labels: ['drift'],
              body: [
                '## Dérive d\'infrastructure détectée',
                '',
                `**Date** : ${today}`,
                '**Resource Group** : `rg-hub-network`',
                '**Subscription** : Hub',
                '',
                'Le `terraform plan` a détecté des différences entre le template et l\'infrastructure de production.',
                '',
                '<details>',
                '<summary>📋 Terraform Plan Output</summary>',
                '',
                '```',
                truncated,
                '```',
                '',
                '</details>',
                '',
                '### Actions recommandées',
                '1. Vérifier si les changements sont intentionnels (modification manuelle en production)',
                '2. Si oui, mettre à jour le template Terraform pour refléter l\'état actuel',
                '3. Si non, exécuter `terraform apply` pour corriger la dérive',
              ].join('\n')
            });

      - name: Summary
        if: always()
        run: |
          DRIFT="${{ steps.evaluate.outputs.drift }}"
          if [ "$DRIFT" = "false" ]; then
            echo "### ✅ No Drift Detected" >> "$GITHUB_STEP_SUMMARY"
            echo "Infrastructure matches the Terraform configuration." >> "$GITHUB_STEP_SUMMARY"
          elif [ "$DRIFT" = "true" ]; then
            echo "### ⚠️ Drift Detected" >> "$GITHUB_STEP_SUMMARY"
            echo "Infrastructure has diverged. A GitHub issue has been created." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            head -100 plan_output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Plan Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Terraform plan encountered an error." >> "$GITHUB_STEP_SUMMARY"
          fi
